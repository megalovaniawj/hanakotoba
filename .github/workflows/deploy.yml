name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace API keys
        run: |
          sed -i "s|__OPENROUTER_KEY__|${{ secrets.OPENROUTER_KEY }}|g" hanakotoba-v2.html
          sed -i "s|__PEXELS_KEY__|${{ secrets.PEXELS_KEY }}|g" hanakotoba-v2.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
